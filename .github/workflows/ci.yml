name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-test:
    name: Lint & test (Py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          # Лёгкая установка без torch/transformers — CI не должен тянуть ML-стек.
          pip install -e ".[dev]"

      - name: Lint with Ruff
        run: ruff check src tests

      - name: Run tests
        run: pytest -v --cov=web_ai_assistant --cov-report=term-missing

      - name: Validate Colab notebook
        run: |
          python -c "import nbformat; nbformat.validate(nbformat.read('notebooks/web_ai_assistant_mvp.ipynb', as_version=4)); print('notebook OK')"

  build:
    name: Build sdist & wheel
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Upload artefacts
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/
